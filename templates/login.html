<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — App Store Bharat ERP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0b0f1e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
    }

    .logo {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0b0f1e;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: .875rem;
      color: #64748b;
      margin-bottom: 36px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      background: #fff;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      color: #1e293b;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }

    .google-btn:hover {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
      background: #f8f9ff;
    }

    .google-btn svg {
      flex-shrink: 0;
    }

    .domain-note {
      margin-top: 20px;
      font-size: .8rem;
      color: #94a3b8;
    }

    .domain-note strong {
      color: #6366f1;
    }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: .875rem;
      color: #dc2626;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛍️</div>
    <div class="brand">App Store Bharat ERP</div>
    <div class="subtitle">Order Management System</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <a href="/auth/login" class="google-btn">
      <!-- Google G logo -->
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Sign in with Google
    </a>

    <p class="domain-note">
      Only <strong>@appsforbharat.com</strong> accounts are allowed.
    </p>
  </div>
</body>
</html>
